<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AN Minecraft Server</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #1a001f, #000);
    color: white;
    text-align: center;
}

/* انیمیشن نور */
.glow {
    color: #b026ff;
    text-shadow: 0 0 10px #b026ff, 0 0 20px #6a0dad;
}

/* هدر */
header {
    padding: 80px 20px;
}

h1 {
    font-size: 60px;
    margin: 0;
}

.subtitle {
    color: #aaa;
    margin-top: 10px;
}

/* کارت‌ها */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(176,38,255,0.3);
    border-radius: 15px;
    padding: 20px;
    width: 220px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    border-color: #b026ff;
}

/* دکمه */
button {
    background: #b026ff;
    border: none;
    padding: 12px 20px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
    font-weight: bold;
}

button:hover {
    background: #6a0dad;
}

/* باکس */
.box {
    margin: 20px auto;
    width: 90%;
    max-width: 600px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(176,38,255,0.3);
}
</style>
</head>

<body>

<header>
    <h1 class="glow">AN SERVER</h1>
    <p class="subtitle">Minecraft Survival • Economy • PvP</p>
</header>

<div class="box">
    <h2>📡 Server Info</h2>
    <p>IP: <b id="ip">your-server-ip</b></p>
    <p>Version: 1.20.1</p>

    <button onclick="copyIP()">📋 Copy IP</button>
    <button onclick="window.location.href='https://discord.gg/yourlink'">💬 Discord</button>
</div>

<h2 class="glow">⭐ Features</h2>

<div class="container">
    <div class="card">💰 Economy System</div>
    <div class="card">🏠 Land Claim</div>
    <div class="card">🛒 Shop GUI</div>
    <div class="card">⚔ PvP System</div>
    <div class="card">🎁 Daily Rewards</div>
    <div class="card">🏆 Ranking System</div>
</div>

<div class="box">
    <h2>📜 Rules</h2>
    <p>❌ No Cheating / Hacks</p>
    <p>❌ No Toxic Chat</p>
    <p>✔ Respect Players</p>
</div>

<div class="box">
    <h2>🛒 Shop</h2>
    <p>Ranks • Items • Perks</p>
    <button onclick="alert('Shop coming soon!')">Open Shop</button>
</div>

<script>
function copyIP() {
    navigator.clipboard.writeText(document.getElementById("ip").innerText);
    alert("Server IP Copied!");
}
</script>

</body>
</html>
